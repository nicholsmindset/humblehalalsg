name: CI
on:
  push:
    branches: [master, main]
  pull_request:
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check:content
      - run: npm run test
      - run: npm run build
  e2e:
    runs-on: ubuntu-latest
    env:
      # ClerkProvider needs a publishable key to mount, or the app throws
      # "Missing publishableKey" on every request. Use the real dev key if it's
      # set as a secret, else a valid-format placeholder so the client boots. We
      # deliberately do NOT set CLERK_SECRET_KEY here — proxy.ts self-disables the
      # Clerk middleware without it, so requests aren't rejected with "Invalid host".
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY || 'pk_test_aHVtYmxlLWhhbGFsLWNpLmNsZXJrLmFjY291bnRzLmRldiQ=' }}
      # Optional: set these secrets to un-skip the data-backed integration specs
      # (business detail, hotel detail, highlights). Empty when unset → those tests
      # skip and the suite still passes on the 15 render/structure smokes.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      LITEAPI_SAND_KEY: ${{ secrets.LITEAPI_SAND_KEY }}
      # The travel AI-search spec exercises the grounded no-AI-key fallback, but
      # since the aiConcierge kill-switch gate (#206) the route 403s when the
      # flag is off — mirror prod (flag ON) so the spec tests the real path.
      AI_CONCIERGE_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # Runs the desktop smoke suite + the mobile-matrix regression guard
      # (e2e/mobile.spec.ts on the mobile-320/mobile-390/tablet-768 projects).
      - run: npm run test:e2e
      # Surface failing overflow/tap-target screenshots for inspection.
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
