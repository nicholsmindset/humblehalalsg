name: Claude — SEO/GEO Scan (monthly)

# C5 growth loop: runs the report-only SEO/GEO opportunity scan
# (scripts/claude-jobs/prompts/seo-scan.md) and opens a PR with the report under
# reports/. It makes NO content edits — it feeds the human roadmap + content
# calendar. Mirrors claude-blog.yml.
#
# NOTE: the scan uses the Ahrefs (and, if configured, GSC-via-Ahrefs) MCP. GitHub
# hosted runners do NOT have that MCP connected, so a scheduled headless run will
# produce a thin/empty report. Run it where the Ahrefs MCP is available (a
# self-hosted runner with the connector, or interactively) for real data; the
# schedule is a reminder + the workflow_dispatch is the manual trigger.

on:
  schedule:
    - cron: "0 2 1 * *" # 1st of the month, 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || vars.CLAUDE_JOBS_ENABLED == '1' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm i -g @anthropic-ai/claude-code
      - name: Run SEO/GEO scan (report only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat scripts/claude-jobs/prompts/seo-scan.md)" \
            --allowedTools "Read" "Write" "Bash(npm run*)" "mcp__ahrefs__*" \
            --max-turns 60 || echo "claude run finished"
      - name: Open PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: claude/seo-scan
          title: "📈 Monthly SEO/GEO opportunity scan"
          body: |
            Auto-generated by the monthly C5 scan (`scripts/claude-jobs/prompts/seo-scan.md`).
            **Report only** — no content edits. Review the top-10 action table under `reports/`
            and feed it into the content calendar (`lib/content-calendar.ts`) + listing acquisition.

            If this report is thin, the runner lacked the Ahrefs MCP — re-run where it's connected.
          labels: automation, seo, needs-human-review
          add-paths: reports/**
