name: Deploy to Vercel (production)

# Deploys the production site (the onnifyworks/humblehalalsg Vercel project →
# www.humblehalal.com) on every push to master, and via a manual "Run workflow"
# button. This runs from GitHub (which the repo owner controls), so it does NOT
# depend on anyone's local Vercel CLI login.
#
# ONE-TIME SETUP — add a single repo secret:
#   Settings → Secrets and variables → Actions → New repository secret
#     name:  VERCEL_TOKEN
#     value: a Vercel token created from the account/team that OWNS the project
#            (vercel.com → onnifyworks → Account Settings → Tokens → Create)
# The org/project IDs below are public identifiers (they appear in every Vercel
# deployment URL), not secrets — hardcoded so you only need the one token.
# Keep these aligned with .vercel/project.json; stale IDs build against the
# wrong environment and can silently miss production-only configuration.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  VERCEL_ORG_ID: team_LM7eKqFaMCaLkEM9EXxQh0Mr
  VERCEL_PROJECT_ID: prj_YYD34CCS5WgyjP5m2mTg2xOqCeNp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify VERCEL_TOKEN is configured
        id: gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret is not set — skipping deploy. Add it in Settings → Secrets and variables → Actions, then re-run."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            clean_token="$(printf '%s' "$VERCEL_TOKEN" | tr -d '[:space:]')"
            if [[ ! "$clean_token" =~ ^vcp_[A-Za-z0-9]+$ ]]; then
              echo "::error::VERCEL_TOKEN has an invalid format after whitespace normalization."
              exit 1
            fi
            echo "::add-mask::$clean_token"
            printf 'VERCEL_TOKEN_CLEAN=%s\n' "$clean_token" >> "$GITHUB_ENV"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        if: steps.gate.outputs.ok == 'true'
        run: npm i -g vercel@latest

      - name: Pull production environment
        if: steps.gate.outputs.ok == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN_CLEAN"

      - name: Build (production)
        if: steps.gate.outputs.ok == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN_CLEAN"

      - name: Deploy prebuilt to production
        if: steps.gate.outputs.ok == 'true'
        # --archive=tgz uploads one archive instead of thousands of files,
        # avoiding the free-plan "api-upload-free" 5,000-file/24h upload cap.
        run: vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN_CLEAN"
