name: Security

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    # Weekly re-scan so newly-disclosed advisories surface without a code change.
    - cron: "30 5 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (prod deps, high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npx --yes audit-ci@^7 --config ./audit-ci.jsonc

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
