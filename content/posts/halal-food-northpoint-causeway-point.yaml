sections:
  - h2: "Is there halal food at Northpoint & Causeway Point?"
    body:
      - >-
        Yes — both are large heartland malls serving established residential towns, so
        halal food is well represented. Northpoint City is Yishun's main mall and
        Causeway Point anchors Woodlands, and each has a sizeable food hall alongside
        restaurant levels, giving you a broad choice of certified and Muslim-owned
        options.
      - >-
        As always, confirm before you order: look for the MUIS halal certificate on
        display or the Muslim-Owned label, and treat a "no pork, no lard" sign as
        helpful but not the same as MUIS certification.
    bullets:
      - "Both are major heartland malls with big food halls"
      - "Local, Western, Japanese and Korean options"
      - "Look for the MUIS certificate or the Muslim-Owned label"
  - h2: "Northpoint City, Yishun"
    body:
      - >-
        Northpoint City is one of the largest suburban malls in the north and sits
        right by Yishun MRT and the bus interchange. Its food hall is the quickest
        place to find halal-friendly stalls, with more sit-down restaurants spread
        across the levels — handy for a family meal or a quick bite between errands.
    bullets:
      - "Directly linked to Yishun MRT and bus interchange"
      - "Large food hall plus restaurant levels"
      - "Family-friendly with a broad halal spread"
  - h2: "Causeway Point, Woodlands"
    body:
      - >-
        Causeway Point sits above Woodlands MRT and next to the regional bus
        interchange, making it the go-to mall for the far north and anyone heading to
        or from the Causeway. It's a busy, well-rounded mall with plenty of halal
        options across its food hall and restaurants.
    bullets:
      - "Above Woodlands MRT, by the bus interchange"
      - "Convenient for the Causeway and the far north"
      - "Food hall and full-service restaurants"
  - h2: "Getting there & finding halal near you"
    body:
      - >-
        Both malls sit on the North-South MRT line — Yishun for Northpoint City and
        Woodlands for Causeway Point — so they're easy to reach and easy to pair with
        a trip north. To see exactly which outlets are certified and what's closest,
        open the directory and filter for halal.
    links:
      - label: "Browse the halal directory"
        href: "https://www.humblehalal.com/halal"
      - label: "Open the halal map"
        href: "https://www.humblehalal.com/map"
      - label: "Is it halal? brand checker"
        href: "https://www.humblehalal.com/is-halal"
faq:
  - q: "Is there halal food at Causeway Point?"
    a: >-
      Yes — Causeway Point in Woodlands has halal options across its food hall and
      restaurant levels, covering local, Western, Japanese and Korean. Check each
      outlet's MUIS certificate or Muslim-Owned label before ordering.
  - q: "Is there halal food at Northpoint City?"
    a: >-
      Yes. Northpoint City in Yishun is one of the north's largest malls and has a
      sizeable food hall plus restaurants with halal options. Confirm status via the
      MUIS certificate as it can vary by outlet.
  - q: "What's the nearest MRT?"
    a: >-
      Both malls are on the North-South line. Yishun MRT connects directly to
      Northpoint City, and Woodlands MRT sits beneath Causeway Point, next to the bus
      interchange.
  - q: "How do I know an outlet is really halal?"
    a: >-
      Look for the MUIS halal certificate on display or the Muslim-Owned label. A
      "no pork, no lard" sign is self-declared and is not the same as MUIS
      certification. The MUIS HalalSG register is the authoritative source.
