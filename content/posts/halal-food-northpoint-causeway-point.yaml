title: "Halal Food at Northpoint & Causeway Point (Yishun/Woodlands)"
status: scheduled
dek: "The north's two biggest heartland malls sit right on the MRT — here's where to find halal food at Northpoint City in Yishun and Causeway Point in Woodlands."
answer: >-
  Northpoint City in Yishun and Causeway Point in Woodlands are the north's two
  biggest heartland malls, and both are strong for halal food — MUIS-certified
  chains, Muslim-owned eateries and food-hall stalls covering local, Western,
  Japanese and Korean. Each sits directly on the MRT. Look for the MUIS certificate
  or the Muslim-Owned label, and use the directory to find the nearest.
author: The Humble Halal Team
datePublished: 2026-08-08
dateModified: 2026-08-08
readMins: 8
category: areas-malls
tags:
