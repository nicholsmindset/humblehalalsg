faq:
  - q: "Is nasi padang halal in Singapore?"
    a: >-
      Nasi padang is a Malay-Indonesian cuisine and most stalls in Singapore are
      Muslim-run and pork-free. To be certain, look for the MUIS halal certificate
      or a Muslim-Owned label on the stall, or check the outlet on the Humble Halal
      directory before you visit.
  - q: "What is the difference between nasi padang and nasi campur?"
    a: >-
      Both are rice with a mix of dishes. Nasi padang specifically refers to the
      Minangkabau (West Sumatran) style, known for rendang and rich coconut curries,
      while nasi campur ("mixed rice") is a broader term for any rice-and-sides plate
      across the Malay-Indonesian world.
  - q: "What should I order at nasi padang?"
    a: >-
      A safe first plate is rice with rendang or ayam bakar, one vegetable such as
      sayur lodeh, and a spoon of sambal goreng. Add fish or squid sambal and a
      begedil if you're hungry, and ask for extra gravy over the rice.
  - q: "Is rendang spicy?"
    a: >-
      Rendang is more deeply spiced than fiery — long, slow cooking mellows the chilli
      into a rich, aromatic flavour. If you want more heat, ask for extra sambal on
      the side rather than expecting the rendang itself to be hot.
  - q: "Is nasi padang eaten by hand?"
    a: >-
      Traditionally it's eaten with the right hand, but cutlery is completely normal
      in Singapore's hawker centres and food courts. Eat whichever way you're
      comfortable with.
