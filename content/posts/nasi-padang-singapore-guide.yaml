title: "Nasi Padang in Singapore: The Ultimate Guide"
status: scheduled
dek: "Rendang, ayam bakar, sambal goreng and rice by the plate — nasi padang is one of Singapore's most-loved Malay-Indonesian spreads. Here's how it works and how to eat it halal."
answer: >-
  Nasi padang is steamed rice served with a pick-and-mix of Minangkabau-style
  dishes — rendang, ayam bakar, sambal goreng, sayur lodeh and more — displayed
  at the counter so you point at what you want. Much of Singapore's nasi padang
  is Muslim-run, but always look for the MUIS halal certificate or a Muslim-Owned
  label, and use the directory to confirm the stall you're visiting.
