sections:
  - h2: "The five daily prayers"
    body:
      - >-
        Muslims pray five times a day, each within its own window set by the sun. In
        Singapore the prayers are known by their Malay names, and each has a start time
        after which it may be prayed until the next prayer begins.
    bullets:
      - "Subuh (Fajr) — before dawn, until sunrise (Syuruk)"
      - "Zohor (Dhuhr) — after the sun passes its peak, in the early afternoon"
      - "Asar (Asr) — mid to late afternoon"
      - "Maghrib — just after sunset"
      - "Isyak (Isha) — night, after the twilight fades"
  - h2: "Who sets prayer times in Singapore?"
    body:
      - >-
        The official authority is MUIS (Majlis Ugama Islam Singapura). It publishes the
        daily and monthly prayer timetable for Singapore, which mosques, apps and tools
        follow. Because the times are based on the sun's position over Singapore, they
        move by a minute or two each day through the year.
      - >-
        Syuruk (sunrise) is listed alongside the five prayers because it marks the end of
        the Subuh window — you'll often see it on the same timetable.
    bullets:
      - "MUIS publishes the official Singapore timetable"
      - "Times shift slightly each day with the sun"
      - "Syuruk marks the end of the Subuh window"
  - h2: "How to check today's waktu solat"
    body:
      - >-
        The reliable way is to follow a timetable aligned with MUIS rather than a generic
        global calculator, which can differ by several minutes. Our prayer-times tool shows
        today's times for Singapore, and you can find the qibla direction for prayer too.
    links:
      - label: "Today's prayer times"
        href: "https://www.humblehalal.com/tools/prayer-times"
      - label: "Find the qibla direction"
        href: "https://www.humblehalal.com/tools/qibla"
      - label: "Mosques & prayer spaces near you"
        href: "https://www.humblehalal.com/mosques"
  - h2: "Friday (Jumaat) prayers"
    body:
      - >-
        On Fridays, the Zohor prayer is replaced by the congregational Jumaat prayer at
        the mosque, which includes a khutbah (sermon). Timings vary by mosque, so check
        your local masjid's Jumaat schedule — many run more than one session to manage
        the crowd.
    bullets:
      - "Jumaat replaces Zohor on Fridays, prayed in congregation"
      - "Includes the khutbah (sermon) before the prayer"
      - "Check your mosque's session timings in advance"
faq:
  - q: "What time is Subuh in Singapore?"
    a: >-
      Subuh (Fajr) begins before dawn and its window ends at sunrise (Syuruk). The exact
      time shifts by a minute or two daily, so check the day's MUIS-aligned timetable or
      our prayer-times tool for today's Subuh time.
  - q: "Are these prayer times MUIS-approved?"
    a: >-
      The official Singapore prayer timetable is published by MUIS. Reliable local apps
      and our prayer-times tool follow it. A generic global calculator can differ by a few
      minutes, so prefer a MUIS-aligned source.
  - q: "How many times do Muslims pray a day?"
    a: >-
      Five: Subuh, Zohor, Asar, Maghrib and Isyak. Each has its own time window set by the
      sun, and on Fridays the congregational Jumaat prayer replaces Zohor.
  - q: "Do prayer times change every day?"
    a: >-
      Yes — because they follow the sun's position over Singapore, the times move slightly
      each day through the year. Always check today's timetable rather than relying on a
      fixed time.
