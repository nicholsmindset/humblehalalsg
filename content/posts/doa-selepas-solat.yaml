faq:
  - q: "What do you recite after solat?"
    a: >-
      The common sunnah practice is istighfar (Astaghfirullah) three times, a short
      remembrance of Allah as the source of peace, then the tasbih — Subhanallah,
      Alhamdulillah and Allahu Akbar thirty-three times each — along with Ayat Kursi and
      personal doa.
  - q: "How many times do you recite the tasbih after prayer?"
    a: >-
      The widely taught practice is thirty-three times each for Subhanallah, Alhamdulillah
      and Allahu Akbar, completing one hundred with a closing remembrance of the oneness of
      Allah.
  - q: "Should I recite Ayat Kursi after solat?"
    a: >-
      Yes, reciting Ayat Kursi (al-Baqarah 255) after each fardh prayer is a strongly
      encouraged sunnah, together with the short surahs al-Ikhlas, al-Falaq and an-Nas.
  - q: "Where can I learn the full Arabic and audio?"
    a: >-
      Refer to MUIS resources and your local asatizah for the complete Arabic text,
      correct pronunciation and audio. Wording can differ slightly between teachers, so
      learning from a qualified source is best.
