sections:
  - h2: "Begin with istighfar"
    body:
      - >-
        The sunnah is to start the post-prayer dhikr by seeking Allah's forgiveness. It
        is commonly recited three times.
      - >-
        Rumi: "Astaghfirullah" (x3) — Meaning: "I seek forgiveness from Allah." Many then
        continue: "Allahumma antas-salam, wa minkas-salam, tabarakta ya dzal-jalali
        wal-ikram" — "O Allah, You are Peace and from You is peace; blessed are You,
        O Owner of majesty and honour."
    bullets:
      - "Astaghfirullah — recited three times"
      - "Followed by the short remembrance of Allah as the source of peace"
  - h2: "The tasbih after prayer"
    body:
      - >-
        The best-known post-prayer dhikr is the tasbih. The widely taught practice is to
        recite each of the following thirty-three times, completing one hundred with a
        closing remembrance.
    bullets:
      - "Subhanallah (x33) — Glory be to Allah"
      - "Alhamdulillah (x33) — All praise is due to Allah"
      - "Allahu Akbar (x33) — Allah is the Greatest"
      - "Complete the hundred with La ilaha illallah wahdahu la sharika lah..."
  - h2: "Ayat Kursi & other recitations"
    body:
      - >-
        It is also sunnah to recite Ayat Kursi (Surah al-Baqarah, verse 255) after the
        fardh prayer, along with the short surahs (al-Ikhlas, al-Falaq and an-Nas). These
        are among the most encouraged remembrances to close the prayer.
    bullets:
      - "Ayat Kursi after each fardh prayer"
      - "Surah al-Ikhlas, al-Falaq and an-Nas"
      - "Personal doa in your own words is encouraged too"
  - h2: "When to recite, and where to learn more"
    body:
      - >-
        Recite these before standing up from the prayer mat, while still facing the qibla.
        Practices and wording can differ slightly between teachers; for the full Arabic
        text, audio and a deeper explanation, refer to MUIS resources or your local
        asatizah. Our tools can help you keep count and find the qibla.
    links:
