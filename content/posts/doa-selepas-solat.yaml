title: "Doa Selepas Solat — Rumi, Arabic & Meaning"
status: scheduled
dek: "The dhikr and doa commonly recited after the fardh prayer — istighfar, tasbih and more — with transliteration (rumi) and meaning, plus when to recite them."
answer: >-
  After the fardh (obligatory) prayer, it is sunnah to recite dhikr and doa before
  leaving the prayer mat. The common practice is to begin with istighfar (seeking
  forgiveness) three times, recite short remembrances, then the tasbih — Subhanallah,
  Alhamdulillah and Allahu Akbar. Below are the widely taught recitations in rumi with
  their meaning; follow the guidance of MUIS and your asatizah for details.
author: The Humble Halal Team
