sections:
  - h2: "What does halal mean?"
    body:
      - >-
        Halal (حلال) is an Arabic word meaning "permissible" or "lawful". Its
        opposite is haram, meaning "forbidden". The terms cover far more than food
        — they describe anything allowed or disallowed in Islam — but in everyday
        Singapore use, "halal" almost always refers to food and drink a Muslim is
        permitted to consume.
      - >-
        Between clearly halal and clearly haram sits a third category: mushbooh,
        meaning "doubtful". This is where an ingredient's status depends on its
        source — gelatine, some emulsifiers, rennet in cheese, or the alcohol in a
        flavouring. When something is mushbooh, the cautious approach is to verify
        it or avoid it until you know.
    bullets:
      - "Halal = permissible; haram = forbidden; mushbooh = doubtful"
      - "In Singapore the word is used mostly for food and drink"
      - "Doubtful (mushbooh) ingredients should be verified, not assumed"
  - h2: "What makes food halal?"
    body:
      - >-
        Food is halal when it meets a few clear conditions. There must be no pork or
        pork derivatives (including lard and pork-based gelatine), and no khamr —
        intoxicating alcohol — whether as a drink or a cooking ingredient such as
        mirin, sake or rum. Any meat and poultry must come from a permitted animal
        that has been slaughtered according to Islamic rites (zabihah), and halal
        food must not be cross-contaminated with non-halal items during preparation,
        cooking or storage.
      - >-
        That last point is why certification matters. A dish can use halal
        ingredients yet still be prepared on shared equipment with non-halal food,
        so a credible halal claim is really a claim about the whole kitchen, not just
        the recipe.
    bullets:
      - "No pork or pork derivatives"
      - "No alcohol — including cooking wines like mirin and sake"
      - "Meat from permitted animals, slaughtered the prescribed way"
      - "No cross-contamination with non-halal food during preparation"
  - h2: "What is the MUIS halal logo — and what it is not"
    body:
      - >-
        In Singapore, halal certification is issued by the Majlis Ugama Islam
        Singapura (MUIS), the Islamic Religious Council of Singapore. When you see
        the MUIS halal logo displayed at an eatery or on a product, it means that
        outlet or manufacturer has been audited and certified against MUIS's Singapore
        MUIS Halal Certification (SMHC) standards — covering ingredients, suppliers,
        preparation and handling.
      - >-
        Crucially, a "no pork, no lard" sign is not halal certification. It tells you
        pork isn't used, but says nothing about alcohol, meat slaughter, or
        cross-contamination, and it isn't audited by anyone. The same goes for a
        restaurant simply telling you it's "Muslim-friendly". The trusted proof is a
        valid MUIS certificate (check it hasn't expired) or a clear Muslim-Owned
        declaration you can verify.
    links:
      - label: "MUIS halal certification, explained"
        href: "https://www.humblehalal.com/muis-halal-certification-explained"
      - label: "How to get MUIS halal certified"
        href: "https://www.humblehalal.com/how-to-get-halal-certified-muis"
  - h2: "How to check if food is halal in Singapore"
    body:
      - >-
        The most reliable check is the official MUIS HalalSG register, which lists
        every currently certified premises and product. Beyond that, look for the
        MUIS logo on display and confirm the certificate is in date, and use the
        Humble Halal directory to see an outlet's certification or Muslim-Owned status
        before you go.
      - >-
        For packaged food and chain restaurants, our "Is it halal?" brand checker
        gives you a direct answer for popular brands, and our ingredient checker helps
        you decode a doubtful additive or E-number on a label. When in doubt, ask the
        outlet directly — and treat unverified claims as doubtful until confirmed.
    links:
