title: "What Is Halal? Meaning, the Halal Logo & MUIS Certification"
status: scheduled
dek: "Halal means 'permissible' in Islam — but what makes food halal, what does the MUIS halal logo actually certify, and how do you check a restaurant or product in Singapore? A plain-English guide."
answer: >-
  Halal (حلال) is Arabic for "permissible" — food and drink allowed under Islamic
  law. For food to be halal it must contain no pork or pork derivatives and no
  alcohol, and any meat must come from a permitted animal slaughtered in the
  prescribed way. In Singapore, the trusted proof is the MUIS halal certificate
  and its logo; a "no pork, no lard" sign is not the same thing. Always verify a
  specific outlet on the MUIS HalalSG register or the Humble Halal directory.
