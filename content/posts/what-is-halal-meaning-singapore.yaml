faq:
  - q: "What does halal mean?"
    a: >-
      Halal is Arabic for "permissible" — it describes what is allowed under Islamic
      law. For food, halal means no pork or pork derivatives, no alcohol, and meat
      from a permitted animal slaughtered in the prescribed way, with no
      cross-contamination from non-halal food.
  - q: "Is halal just 'no pork'?"
    a: >-
      No. Avoiding pork is only part of it. Halal food must also be free of alcohol
      (including cooking wines), use meat that was slaughtered according to Islamic
      rites, and be prepared without cross-contamination. That is why a "no pork, no
      lard" sign is not the same as halal certification.
  - q: "What does the MUIS halal logo certify?"
    a: >-
      The MUIS halal logo means the premises or product has been audited and certified
      by the Majlis Ugama Islam Singapura against Singapore's halal certification
      standards — covering ingredients, suppliers, preparation and handling. Always
      check the certificate is valid and not expired.
  - q: "How do I check if a restaurant is halal in Singapore?"
    a: >-
      Check the official MUIS HalalSG register, look for a valid MUIS certificate on
      display, or confirm the outlet's status on the Humble Halal directory. For
      chains and packaged brands, use our "Is it halal?" brand checker.
  - q: "What is the difference between halal, haram and mushbooh?"
    a: >-
      Halal means permissible, haram means forbidden, and mushbooh means doubtful —
      where an ingredient's status depends on its source (for example gelatine or a
      flavouring's alcohol carrier). Mushbooh items should be verified or avoided
      until their source is confirmed.
  - q: "Is 'Muslim-owned' the same as halal-certified?"
    a: >-
      Not automatically. A Muslim-owned outlet is often pork- and alcohol-free, but
      only MUIS certification is independently audited. Where an outlet isn't
      certified, a clear Muslim-Owned declaration you can verify is the next best
      signal — treat unverified claims as doubtful.
