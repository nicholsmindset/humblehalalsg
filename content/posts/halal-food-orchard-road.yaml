imageAlt: "A halal meal on Orchard Road with mall storefronts behind in Singapore"
sections:
  - h2: "Is there halal food in Orchard Road?"
    body:
      - >-
        Yes — Orchard is far more halal-friendly than its luxury-mall image
        suggests. Nearly every major mall along the belt has at least a handful of
        MUIS-certified or Muslim-owned outlets, and the basement food halls are the
        quickest place to find them.
      - >-
        As always, confirm before you order: look for the MUIS halal certificate on
        display or the Muslim-Owned label, and treat a plain "no pork, no lard" sign
        as helpful but not the same as certification.
    bullets:
      - "Basement food halls hold the most halal options"
      - "Look for the MUIS certificate or the Muslim-Owned label"
      - "Certification can vary by outlet within the same chain"
  - h2: "ION Orchard & Wisma Atria"
    body:
      - >-
        ION Orchard's basement food hall and the connected Wisma Atria are the
        densest cluster of halal-friendly options on the belt — quick local plates,
        Japanese and Korean-style bowls, dessert and bubble tea, and a few certified
        chains. It's the easiest first stop straight off Orchard MRT.
    bullets:
      - "ION basement food hall — mixed quick-service halal stalls"
      - "Wisma Atria food republic — several halal options"
      - "Dessert and bubble tea for an afternoon break"
  - h2: "Plaza Singapura & 313@Somerset"
    body:
      - >-
        Towards Dhoby Ghaut, Plaza Singapura is a family-friendly mall with a strong
        halal line-up, while 313@Somerset covers the younger, café-and-casual end.
        Between them you'll find full-service halal restaurants, not just food-court
        stalls.
    bullets:
      - "Plaza Singapura — family restaurants and food court"
      - "313@Somerset — cafés and casual dining"
      - "Both a short walk along the covered belt"
  - h2: "Getting there & finding halal near you"
    body:
      - >-
        The whole belt runs along the North-South MRT line — Orchard, Somerset and
        Dhoby Ghaut stations put you within a few minutes of everything above. To see
        exactly which outlets are certified and what's closest, open the directory and
        filter for halal.
    links:
      - label: "Halal food in Orchard — directory"
        href: "https://www.humblehalal.com/halal-food/orchard"
      - label: "Browse the halal directory"
        href: "https://www.humblehalal.com/halal"
      - label: "Is it halal? brand checker"
        href: "https://www.humblehalal.com/is-halal"
faq:
  - q: "Is there halal food in ION Orchard?"
    a: >-
      Yes. ION Orchard's basement food hall and the adjacent Wisma Atria have several
      MUIS-certified and Muslim-owned outlets, from local plates to dessert and bubble
      tea. Check each outlet's certificate before ordering, as status can vary.
  - q: "What halal restaurants are on Orchard Road?"
    a: >-
      You'll find halal options across ION Orchard, Wisma Atria, Plaza Singapura and
      313@Somerset — food-hall stalls plus full-service restaurants. Use the Humble
      Halal directory to filter for MUIS-certified and Muslim-owned places near you.
  - q: "What's the nearest MRT for halal food in Orchard?"
    a: >-
      Orchard, Somerset and Dhoby Ghaut stations on the North-South line all sit on
      the belt. Orchard MRT connects directly to ION and Wisma Atria; Dhoby Ghaut is
      best for Plaza Singapura.
  - q: "Are there halal cafés in Orchard?"
    a: >-
      Yes — the Somerset stretch and several malls have Muslim-owned and halal-friendly
      cafés for brunch, coffee and dessert. Filter the directory for cafés to find the
      nearest.
