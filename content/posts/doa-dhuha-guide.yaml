title: "Doa Dhuha & Solat Dhuha Guide"
status: scheduled
dek: "What solat Dhuha is, its timing (forenoon, after sunrise until before Zohor), how many rakaat, and the well-known doa after it — in rumi with meaning."
answer: >-
  Solat Dhuha is a sunnah (voluntary) prayer performed in the forenoon — from after
  sunrise, once the sun has risen a little, until just before Zohor. It is prayed in units
  of two rakaat, commonly from two up to eight or more. Afterwards many recite the
  well-known Doa Dhuha, asking for blessing in one's provision (rezeki). Below is the timing,
  rakaat and doa in rumi with meaning; refer to MUIS and your asatizah for the full Arabic.
