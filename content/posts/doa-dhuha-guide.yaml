sections:
  - h2: "What is solat Dhuha?"
    body:
      - >-
        Solat Dhuha is a sunnah (voluntary) prayer offered in the forenoon, during the
        Dhuha period when the sun has risen. It is a beloved, uncomplicated prayer that many
        Muslims keep as a daily habit, often associated with seeking barakah (blessing) in
        one's provision and starting the day in remembrance of Allah. Being sunnah, it is
        not obligatory — but it carries great encouragement and reward.
      - >-
        The prayer itself follows the ordinary form: two rakaat at a time, with the usual
        recitation, ruku' and sujud. Its distinguishing features are its timing in the
        forenoon and the well-known doa many recite once they have finished.
    bullets:
      - "A voluntary (sunnah) forenoon prayer"
      - "Prayed in the ordinary two-rakaat form"
      - "Associated with seeking blessing in one's provision"
  - h2: "When is the time for solat Dhuha?"
    body:
      - >-
        The Dhuha window opens a short while after sunrise (Syuruk) — once the sun has
        visibly risen, roughly fifteen to twenty minutes after sunrise — and lasts until
        shortly before Zohor enters at midday. A common recommendation is to pray it once
        the morning is well underway. Because the exact window depends on sunrise and Zohor,
        which shift by a minute or two each day, it helps to check the day's timetable.
    bullets:
      - "Starts a short while after sunrise (Syuruk)"
      - "Ends shortly before Zohor at midday"
      - "The window shifts slightly each day with the sun"
    links:
      - label: "Today's prayer times, Syuruk & Zohor"
        href: "https://www.humblehalal.com/tools/prayer-times"
      - label: "Waktu solat Singapore guide"
        href: "https://www.humblehalal.com/blog/waktu-solat-singapore"
  - h2: "How many rakaat?"
    body:
      - >-
        Solat Dhuha is prayed in sets of two rakaat. The minimum is two rakaat, and it is
        commonly prayed as four, six or eight, with some accounts mentioning up to twelve.
        You perform two rakaat, give salam, and repeat as many pairs as you wish within the
        Dhuha window. Even two rakaat is a complete and rewarded observance, so it is easy
        to begin with a small, consistent habit.
    bullets:
      - "Prayed two rakaat at a time"
      - "Minimum two; commonly four, six or eight"
      - "Give salam after each pair, then repeat"
    links:
      - label: "Find the qibla direction"
        href: "https://www.humblehalal.com/tools/qibla"
      - label: "Mosques & prayer spaces near you"
        href: "https://www.humblehalal.com/mosques"
  - h2: "The doa after solat Dhuha"
    body:
      - >-
        After completing the prayer, many recite the well-known Doa Dhuha, which asks Allah
        for blessing and ease in one's provision. It is a longer supplication, so it is best
        learned in full from a qualified source; a widely known opening is:
      - >-
        Rumi: "Allahumma innad-dhuha-a dhuha-uka, wal-bahaa-a bahaa-uka, wal-jamaala
        jamaaluka, wal-quwwata quwwatuka." Meaning: "O Allah, verily the forenoon is Your
        forenoon, the splendour is Your splendour, the beauty is Your beauty, and the
        strength is Your strength." The doa continues to ask that if one's provision is in
        the heavens it be brought down, and if it is difficult it be made easy — closing
        with hope in Allah's mercy and power.
    bullets:
      - "Recited after finishing the prayer"
      - "Asks for blessing and ease in one's provision (rezeki)"
      - "Learn the full wording from a qualified source"
  - h2: "Where to learn the full text and audio"
    body:
      - >-
        The timing, rakaat and doa above are the widely taught essentials, but the full
        Arabic of the Doa Dhuha, its correct pronunciation and audio are best learned
        directly. Wording can differ slightly between teachers, and there are recognised
        differences of opinion on some details. For the complete text and any rulings, refer
        to MUIS resources and your local asatizah. This guide is an introduction to help you
        begin, not a ruling.
    links:
      - label: "Doa selepas solat — dhikr after prayer"
        href: "https://www.humblehalal.com/blog/doa-selepas-solat"
      - label: "Digital tasbih counter"
        href: "https://www.humblehalal.com/tools/tasbih"
faq:
  - q: "What time is solat Dhuha?"
    a: >-
      Solat Dhuha is prayed in the forenoon — from a short while after sunrise (Syuruk),
      once the sun has risen, until shortly before Zohor at midday. The window shifts
      slightly each day, so check a MUIS-aligned timetable for Syuruk and Zohor.
  - q: "How many rakaat is solat Dhuha?"
    a: >-
      It is prayed two rakaat at a time. The minimum is two rakaat, and it is commonly
      prayed as four, six or eight, with some accounts mentioning up to twelve. Give salam
      after each pair, then repeat within the Dhuha window.
  - q: "What is the doa after solat Dhuha?"
    a: >-
      A widely known opening is "Allahumma innad-dhuha-a dhuha-uka, wal-bahaa-a bahaa-uka,
      wal-jamaala jamaaluka, wal-quwwata quwwatuka" — "O Allah, verily the forenoon is Your
      forenoon..." It asks for blessing and ease in one's provision. Learn the full text
      from a qualified source.
  - q: "Is solat Dhuha compulsory?"
    a: >-
      No — solat Dhuha is a sunnah (voluntary) prayer, not obligatory. It carries great
      encouragement and reward, and even two rakaat done consistently is a complete
      observance.
  - q: "Where can I learn the full Doa Dhuha and pronunciation?"
    a: >-
      Refer to MUIS resources and your local asatizah for the complete Arabic text, correct
      pronunciation, audio and any differences of opinion. Learning the full wording from a
      qualified source is best.
