imageAlt: "A halal meal at a mall food hall in Tampines, east Singapore"
sections:
  - h2: "Is there halal food in Tampines?"
    body:
      - >-
        Yes — Tampines is one of the best-served areas in the east for halal food. As
        a major regional centre it packs three malls right next to each other around
        Tampines MRT, plus the large Our Tampines Hub community complex a short walk
        away. Between them there's an extensive spread of certified and Muslim-owned
        options across food halls and restaurants.
      - >-
        As always, confirm before you order: look for the MUIS halal certificate on
        display or the Muslim-Owned label, and treat a "no pork, no lard" sign as
        helpful but not the same as MUIS certification.
    bullets:
      - "Three malls plus a community hub in one cluster"
      - "Food halls hold the densest cluster of halal stalls"
      - "Look for the MUIS certificate or the Muslim-Owned label"
  - h2: "The three malls: Tampines Mall, Century Square & Tampines 1"
    body:
      - >-
        Tampines Mall, Century Square and Tampines 1 sit side by side by the MRT and
        together form one of the biggest suburban dining clusters in Singapore. Each
        has a food hall and a good spread of restaurants, so you can easily eat local
        one visit and Western, Japanese or Korean the next — much of it certified or
        Muslim-owned.
    bullets:
      - "Tampines Mall — food hall and family restaurants"
      - "Century Square — casual and sit-down dining"
      - "Tampines 1 — food hall plus restaurant levels"
  - h2: "Our Tampines Hub"
    body:
      - >-
        Our Tampines Hub is a large integrated community and lifestyle complex with
        its own hawker centre and dining outlets, a short walk from the malls. Its
        hawker-style setting is a good place to look for local halal plates, alongside
        the mall food halls nearby.
    bullets:
      - "Integrated community complex with a hawker centre"
      - "Good for local halal hawker-style plates"
      - "A short walk from the three malls"
  - h2: "Getting there & finding halal near you"
    body:
      - >-
        Tampines is served by both an MRT interchange — Tampines on the East-West and
        Downtown lines — and a large bus interchange, so the whole cluster is easy to
        reach. To see exactly which outlets are certified and what's closest, open the
        directory and filter for halal.
    links:
      - label: "Browse the halal directory"
        href: "https://www.humblehalal.com/halal"
      - label: "Open the halal map"
        href: "https://www.humblehalal.com/map"
      - label: "Is it halal? brand checker"
        href: "https://www.humblehalal.com/is-halal"
faq:
  - q: "Is there halal food in Tampines?"
    a: >-
      Yes — Tampines has three malls and the Our Tampines Hub community complex
      clustered around the MRT, all with halal options across food halls and
      restaurants. Check each outlet's MUIS certificate or Muslim-Owned label before
      ordering.
  - q: "Is there halal food at Our Tampines Hub?"
    a: >-
      Yes. Our Tampines Hub has its own hawker centre and dining outlets, a short walk
      from the malls, and is a good place to look for local halal hawker-style plates.
      Confirm status via the MUIS certificate.
  - q: "What's the nearest MRT?"
    a: >-
      Tampines MRT, an interchange on the East-West and Downtown lines, sits by the
      three malls, with a large bus interchange attached. Tampines West and Tampines
      East on the Downtown line are also nearby.
  - q: "How do I know an outlet is really halal?"
    a: >-
      Look for the MUIS halal certificate on display or the Muslim-Owned label. A
      "no pork, no lard" sign is self-declared and is not the same as MUIS
      certification. The MUIS HalalSG register is the authoritative source.
