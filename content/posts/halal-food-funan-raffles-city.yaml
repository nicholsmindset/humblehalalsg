image: "/blog/best-halal-cafes-singapore.webp"
imageAlt: "A halal meal at a Civic District mall near City Hall in Singapore"
sections:
  - h2: "Is there halal food at Funan & Raffles City?"
    body:
      - >-
        Yes — both malls sit in the busy City Hall area and cater to office crowds,
        tourists and families, which means halal food is well represented. Funan
        leans towards a modern, tech-and-lifestyle mix with a lively basement dining
        cluster, while Raffles City is a larger all-rounder with a big food hall and
        plenty of restaurants.
      - >-
        As always, confirm before you order: look for the MUIS halal certificate on
        display or the Muslim-Owned label, and treat a "no pork, no lard" sign as
        helpful but not the same as MUIS certification.
    bullets:
      - "Two malls a short walk apart at City Hall"
      - "Basement and food-hall levels hold the most halal stalls"
      - "Look for the MUIS certificate or the Muslim-Owned label"
  - h2: "Funan"
    body:
      - >-
        Funan's basement is its dining heart, with a cluster of casual eateries and
        food-hall stalls that make it an easy lunch stop in the Civic District.
        There's a good mix of quick local plates and international options, so it
        suits both a fast bite and a relaxed meal.
    bullets:
      - "Lively basement dining cluster"
      - "Casual eateries and food-hall stalls"
      - "Easy lunch stop for the Civic District"
  - h2: "Raffles City"
    body:
      - >-
        Raffles City is the larger of the two, sitting directly above City Hall MRT
        with a big food hall and a wide spread of restaurants across its levels.
        Between quick plates downstairs and sit-down dining above, it covers most
        cravings — local one visit, Western, Japanese or Korean the next.
    bullets:
      - "Directly above City Hall MRT"
      - "Large food hall plus restaurant levels"
      - "Broad mix from quick plates to full-service dining"
  - h2: "Getting there & finding halal near you"
    body:
      - >-
        City Hall MRT, on the North-South and East-West lines, connects directly to
        Raffles City, and Funan is a short covered walk away. To see exactly which
        outlets are certified and what's closest, open the directory and filter for
        halal.
    links:
      - label: "Browse the halal directory"
        href: "https://www.humblehalal.com/halal"
      - label: "Open the halal map"
