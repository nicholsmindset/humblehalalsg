title: "Halal Food at Funan & Raffles City (City Hall)"
status: scheduled
dek: "Two very different malls sit a short walk apart at City Hall — here's where to find halal food at Funan and Raffles City in the heart of the Civic District."
answer: >-
  Funan and Raffles City sit a short walk apart around City Hall in the Civic
  District, and both have a good spread of halal food — MUIS-certified chains,
  Muslim-owned eateries and food-hall stalls covering local, Western, Japanese and
  Korean. Look for the MUIS certificate or the Muslim-Owned label, and use the
  directory to find the nearest.
author: The Humble Halal Team
datePublished: 2026-08-09
dateModified: 2026-08-09
readMins: 8
category: areas-malls
tags:
  - Funan
