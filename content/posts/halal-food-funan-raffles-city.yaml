faq:
  - q: "Is there halal food at Raffles City?"
    a: >-
      Yes — Raffles City sits above City Hall MRT and has a large food hall plus
      restaurants with halal options across local, Western, Japanese and Korean. Check
      each outlet's MUIS certificate or Muslim-Owned label before ordering.
  - q: "Is there halal food at Funan?"
    a: >-
      Yes. Funan's basement dining cluster has casual eateries and food-hall stalls
      with halal options. Confirm status via the MUIS certificate as it can vary by
      outlet.
  - q: "What's the nearest MRT?"
    a: >-
      City Hall MRT, on the North-South and East-West lines, connects directly to
      Raffles City. Funan is a short covered walk away, and Bras Basah on the Circle
      line is also nearby.
  - q: "How do I know an outlet is really halal?"
    a: >-
      Look for the MUIS halal certificate on display or the Muslim-Owned label. A
      "no pork, no lard" sign is self-declared and is not the same as MUIS
      certification. The MUIS HalalSG register is the authoritative source.
