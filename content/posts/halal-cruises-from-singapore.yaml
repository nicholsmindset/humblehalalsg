sections:
  - h2: "Can you take a halal-friendly cruise from Singapore?"
    body:
      - >-
        Yes. Singapore is a major regional cruise hub, and several lines sail
        round-trip itineraries to nearby destinations. For a Muslim traveller, the
        two things that make a cruise comfortable are reliable halal food and a place
        to pray — and both are increasingly catered for, provided you plan ahead.
      - >-
        The important word is "confirm". Halal meal availability, prayer facilities
        and how strictly they're handled differ from one ship and sailing to the next,
        and they change over time. Treat any general information as a starting point,
        then verify the specifics for your exact sailing directly with the cruise line
        before you pay.
    bullets:
      - "Singapore is a regional cruise hub with many round-trip options"
      - "Halal food and prayer space are the two things to plan for"
      - "Always confirm current arrangements with the line for your sailing"
  - h2: "Finding halal food on board"
    body:
      - >-
        Large ships run several dining venues, and halal food is usually handled in
        one of a few ways: halal-prepared meals made to order on request, clearly
        labelled halal options at the buffet, or — on some sailings — a dedicated
        halal kitchen or menu. Because a ship's galley serves thousands of guests, it's
        best to flag your requirement well in advance rather than assume on the day.
      - >-
        When you enquire, ask specifically how the halal food is sourced and prepared,
        whether it's certified, and whether it's available across the venues you'll
        actually eat at. If you have children or a large family, mention headcount so
        the galley can plan. Bringing a few of your own snacks is a sensible backup for
        port days and late nights.
    bullets:
      - "Request halal meals at the time of booking, not on board"
      - "Ask how it's sourced, prepared and whether it's certified"
      - "Check which venues offer it and note your headcount"
      - "Pack a few backup snacks for port days"
  - h2: "Prayer, qibla and facilities"
    body:
      - >-
        Some ships provide a dedicated prayer room or a multi-faith quiet room; others
        can point you to a suitable quiet space on request. A cabin works perfectly
        well for daily prayers too. For qibla direction at sea, a phone compass app
        will track your heading as the ship moves, and the guest-services desk can
        often help with timings.
      - >-
        Ablution is straightforward in your cabin bathroom. If you're travelling during
        Ramadan or want to pray in congregation, ask guest services early about quiet
        spaces and any arrangements for suhoor and iftar timing, as galley hours can be
        adjusted with notice.
    bullets:
      - "Ask whether the ship has a prayer or quiet room"
      - "Use a phone compass app for qibla at sea"
      - "Your cabin is fine for wudu and daily prayers"
      - "Flag Ramadan needs early so meal timing can be arranged"
  - h2: "Choosing a Muslim-friendly sailing"
    body:
      - >-
        Beyond food and prayer, think about the overall experience. Shorter regional
        itineraries and family-focused sailings tend to be the most comfortable, and
        because our focus is halal food and prayer, simply plan your own days around
        the family-friendly venues, pools and shore excursions rather than the bars and
        nightlife. Shore stops at Muslim-majority destinations often make halal food
        and mosques easy to find on land.
      - >-
        Read the itinerary carefully, check the cabin type and location that suits your
        family, and confirm the halal and prayer arrangements in writing where you can.
    bullets:
      - "Shorter regional and family sailings are often most comfortable"
      - "Plan days around family venues, pools and shore excursions"
      - "Muslim-majority ports make halal food and mosques easy on land"
  - h2: "Before you book: a quick checklist"
    body:
      - >-
        A little verification up front saves disappointment later. Contact the cruise
        line or your travel agent and get the specifics confirmed for your exact
        sailing, then plan the rest of your trip — including how you'll get to the
        cruise terminal and where to pray before boarding.
    bullets:
      - "Confirm halal meal availability and how it's prepared, in writing"
      - "Confirm prayer space, quiet rooms and any qibla help"
      - "Check the itinerary, ports and cabin location"
      - "Note that all details should be reconfirmed close to sailing"
