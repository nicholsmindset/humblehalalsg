faq:
  - q: "Are there halal cruises from Singapore?"
    a: >-
      Several cruise lines sail round-trip from Singapore, and many can provide halal
      meal options and prayer space on request. There isn't one single "halal cruise"
      brand to point to, so the practical approach is to choose a sailing and confirm
      the halal food and prayer arrangements directly with the line before booking.
  - q: "Is the food on a cruise ship halal?"
    a: >-
      Not automatically. Ships serve a broad international menu, but many can prepare
      halal meals on request or label halal options at the buffet. Request halal food
      when you book, ask how it's sourced and prepared, and reconfirm before you sail.
  - q: "Can I pray on a cruise ship?"
    a: >-
      Yes. Some ships have a dedicated prayer or multi-faith quiet room, and your cabin
      is perfectly suitable for daily prayers and wudu. Use a phone compass app for
      qibla direction at sea, and ask guest services about quiet spaces if you'd like
      to pray in congregation.
  - q: "Is there alcohol-free or family-friendly space on cruises?"
    a: >-
      Most large ships have plenty of family-friendly venues, pools, kids' clubs and
      shore excursions you can build your days around. Simply plan your itinerary around
      these rather than the bar areas, and choose family-focused sailings for the most
      comfortable experience.
  - q: "How do I find qibla direction at sea?"
    a: >-
      A compass or qibla app on your phone will track your heading and update as the
      ship moves, so you can orient yourself for each prayer. The guest-services desk
      can often help with local prayer timings as your position changes.
