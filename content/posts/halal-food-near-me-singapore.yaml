  - h2: "Plan your next meal"
    body:
      - >-
        Whether you want a quick food-hall plate or a proper sit-down dinner, the
        fastest route is the same: open the directory or the map, filter for halal,
        and let your location do the rest. From there, our area guides help you go
        deeper on a specific mall or neighbourhood.
    links:
