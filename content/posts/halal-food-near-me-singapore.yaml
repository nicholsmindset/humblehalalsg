faq:
  - q: "How do I find halal food near me in Singapore?"
    a: >-
      Open the Humble Halal directory or map and filter for halal — it shows
      MUIS-certified and Muslim-owned outlets around your location, sortable by
      area, mall and MRT. Confirm each outlet's certificate before ordering.
  - q: "Is most food in Singapore halal?"
    a: >-
      Not automatically, but halal food is widely available. MUIS certifies outlets
      nationwide and many others are Muslim-owned, so most malls and neighbourhoods
      have options. Always look for the MUIS certificate or Muslim-Owned label.
  - q: "How do I know an outlet is really halal?"
    a: >-
      Look for the MUIS halal certificate on display or the Muslim-Owned label. A
      self-declared "no pork, no lard" sign is not the same as MUIS certification.
      The MUIS HalalSG register is the authoritative source to confirm.
  - q: "What's the easiest place to find halal food in a mall?"
    a: >-
      Start at the basement food hall — it usually holds the densest cluster of
      halal-friendly stalls, with sit-down restaurants spread across the upper
      levels. Filter the directory for the specific mall to see what's certified.
  - q: "Can I search for halal food by MRT station?"
    a: >-
      Yes. Interchange stations often connect to a large mall with a food hall, so
      searching the directory by the station you're heading to is a quick way to
      find halal options nearby.
