sections:
  - h2: "How to find halal food near you in Singapore"
    body:
      - >-
        Singapore is one of the easiest places in the world to eat halal. MUIS —
        the Islamic Religious Council of Singapore — runs a national halal
        certification scheme, and certified outlets are found in nearly every
        neighbourhood, mall and MRT interchange. The quickest way to see what's
        genuinely near you is to open the directory and filter for halal, which
        maps certified and Muslim-owned places around your location.
      - >-
        Before you order, confirm each outlet's status. Look for the MUIS halal
        certificate on display or the Muslim-Owned label. Treat a self-declared
        "no pork, no lard" sign as helpful context but not the same as MUIS
        certification, and remember that status can vary between outlets of the
        same chain.
    bullets:
      - "Open the directory and filter for halal near your location"
      - "Look for the MUIS certificate or the Muslim-Owned label in-store"
      - "Certification can differ between branches of the same chain"
    links:
      - label: "Browse the halal directory"
        href: "https://www.humblehalal.com/halal"
      - label: "Open the halal map"
        href: "https://www.humblehalal.com/map"
  - h2: "Halal food by area & mall"
    body:
      - >-
        Most people search for halal food around a specific place — a shopping
        belt, an office district or a mall they're heading to. Singapore's malls
        are a reliable starting point because their basement food halls usually
        hold the densest cluster of halal-friendly stalls, with sit-down
        restaurants spread across the upper levels.
      - >-
        We've published dedicated area guides that walk through where the halal
        options sit in each mall and district. Use them to plan ahead, then
        confirm current certification through the directory when you arrive.
    links:
      - label: "Halal food in Orchard Road"
        href: "https://www.humblehalal.com/blog/halal-food-orchard-road"
      - label: "Halal food at Suntec City & Marina Square"
        href: "https://www.humblehalal.com/blog/halal-food-suntec-marina-square"
      - label: "Halal food at VivoCity & HarbourFront"
        href: "https://www.humblehalal.com/blog/halal-food-vivocity-harbourfront"
      - label: "Halal food at Jurong East"
        href: "https://www.humblehalal.com/blog/halal-food-jurong-east"
  - h2: "Finding halal food by MRT"
    body:
      - >-
        If you're travelling, the MRT is often the easiest way to think about
        "near me". Interchange stations — where two or more lines meet — tend to
        sit under or beside a large mall, which means a food hall full of options
        is usually just a few minutes from the platform.
      - >-
        City Hall, HarbourFront, Jurong East, Serangoon and Tampines are all
        examples of interchanges with major malls attached. Search the directory
        for the station you're heading to, and you'll see the halal outlets
        clustered around it.
    bullets:
      - "Interchange stations usually connect to a large mall"
      - "Basement food halls are the fastest place to find halal stalls"
      - "Search the directory by station to see what's nearby"
  - h2: "Certified vs Muslim-owned: what the labels mean"
    body:
      - >-
        Two labels matter most in Singapore. A MUIS halal certificate means the
        outlet has been audited and certified by MUIS, and it should be displayed
        in-store. A Muslim-Owned label indicates the business is run by Muslims but
        may not hold formal MUIS certification — many are still a good fit, but the
        distinction is worth knowing.
      - >-
        When in doubt, verify. The MUIS HalalSG register is the authoritative
        source for current certification, and our directory links through to it so
        you can check before you commit to a meal.
    bullets:
      - "MUIS-certified — audited and certified by MUIS"
      - "Muslim-Owned — run by Muslims, may not be formally certified"
      - "Confirm current status on the MUIS HalalSG register"
    links:
