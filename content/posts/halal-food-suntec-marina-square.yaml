sections:
  - h2: "Halal food near Suntec Convention Centre"
    body:
      - >-
        Suntec City is one of the largest malls in the CBD, and its size works in your
        favour — there are halal options on almost every level, plus a big food hall.
        It's the go-to for anyone attending an event at the Suntec Convention Centre
        who needs a quick, certified meal nearby.
    bullets:
      - "Large food hall with several halal stalls"
      - "MUIS-certified chains across the mall levels"
      - "Handy for Convention Centre events and CBD lunches"
  - h2: "Marina Square, next door"
    body:
      - >-
        Marina Square connects to Suntec via the walkway and adds another full mall of
        options, skewing a little more towards sit-down restaurants and family dining.
        Between the two malls you can eat local one day and Korean, Japanese or Western
        the next — all halal.
    bullets:
      - "More full-service restaurants than food-court stalls"
      - "Family-friendly, close to the Marina Bay attractions"
      - "Covered link to Suntec — do both in one trip"
  - h2: "What to eat"
    body:
      - >-
        The combined Suntec and Marina Square offering covers most cravings. Confirm
        each outlet's halal status, then take your pick.
    bullets:
      - "Local — nasi padang, mixed rice, Malay and Indian-Muslim plates"
      - "Japanese and Korean bowls, plus halal-certified fast food"
      - "Western mains, cafés and dessert"
  - h2: "Getting there & finding halal"
    body:
      - >-
        Esplanade and Promenade MRT stations are the closest, and both malls are an
        easy walk from City Hall too. To see which outlets are certified and what's
        nearest, open the directory and filter for halal.
    links:
      - label: "Browse the halal directory"
        href: "https://www.humblehalal.com/halal"
      - label: "Halal food by area"
        href: "https://www.humblehalal.com/halal-food/suntec-city"
      - label: "Is it halal? brand checker"
        href: "https://www.humblehalal.com/is-halal"
faq:
  - q: "Is there halal food near Suntec Convention Centre?"
    a: >-
      Yes — Suntec City itself has halal options on most levels plus a large food hall,
      so a certified meal is only minutes from the Convention Centre. Check each outlet's
      MUIS certificate before ordering.
  - q: "What halal food is at Marina Square?"
    a: >-
      Marina Square leans towards sit-down restaurants — local, Japanese, Korean and
      Western — many MUIS-certified or Muslim-owned. It links to Suntec City, so you can
      browse both malls in one trip.
  - q: "What's the nearest MRT?"
    a: >-
      Esplanade and Promenade stations are closest to Suntec City and Marina Square, and
      both malls are a short covered walk from City Hall MRT as well.
  - q: "How do I know an outlet is really halal?"
    a: >-
      Look for the MUIS halal certificate on display or the Muslim-Owned label. A
      "no pork, no lard" sign is self-declared and is not the same as MUIS certification.
