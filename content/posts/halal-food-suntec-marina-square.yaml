title: "Halal Food at Suntec City & Marina Square"
status: scheduled
dek: "Two of the CBD's biggest malls sit side by side — here's where to find halal food at Suntec City and Marina Square, near the Convention Centre and Marina Bay."
answer: >-
  Suntec City and Marina Square, linked in the CBD near the Convention Centre, both
  have a wide spread of halal food — MUIS-certified chains, Muslim-owned eateries and
  food-hall stalls covering local, Western, Japanese and Korean. Look for the MUIS
  certificate or the Muslim-Owned label, and use the directory to find the nearest.
author: The Humble Halal Team
datePublished: 2026-07-30
dateModified: 2026-07-30
readMins: 8
category: areas-malls
tags:
