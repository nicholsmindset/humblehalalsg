faq:
  - q: "Is there halal food at VivoCity?"
    a: >-
      Yes — VivoCity has halal options on several levels plus a large food hall,
      covering local, Western, Japanese and Korean. Check each outlet's MUIS
      certificate or Muslim-Owned label before ordering, as status can vary.
  - q: "What's the nearest MRT to VivoCity?"
    a: >-
      HarbourFront MRT, on the North-East and Circle lines, sits directly beneath
      VivoCity. The mall also connects to HarbourFront Centre and the walkway to
      Sentosa.
  - q: "Is there halal food on the way to Sentosa?"
    a: >-
      Yes. VivoCity is the main gateway to Sentosa via the boardwalk and Sentosa
      Express, and it's the most convenient place to find halal food before or after
      your visit. Filter the directory for the mall to see certified outlets.
  - q: "How do I know an outlet is really halal?"
    a: >-
      Look for the MUIS halal certificate on display or the Muslim-Owned label. A
      "no pork, no lard" sign is self-declared and is not the same as MUIS
      certification. The MUIS HalalSG register is the authoritative source.
