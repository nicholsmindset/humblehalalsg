image: "/blog/halal-high-tea-singapore.webp"
imageAlt: "A plated halal meal at a waterfront mall near HarbourFront in Singapore"
sections:
  - h2: "Is there halal food at VivoCity?"
    body:
      - >-
        Yes — as Singapore's largest mall, VivoCity has the scale to carry halal
        options on multiple levels, and its size works in your favour. There's a
        big food hall alongside sit-down restaurants, so whether you want a quick
        plate before Sentosa or a proper meal by the water, you'll find something
        certified or Muslim-owned.
      - >-
        As always, confirm before you order: look for the MUIS halal certificate on
        display or the Muslim-Owned label, and treat a "no pork, no lard" sign as
        helpful but not the same as MUIS certification.
    bullets:
      - "Large food hall with several halal stalls"
      - "MUIS-certified chains across the mall levels"
      - "Look for the MUIS certificate or the Muslim-Owned label"
  - h2: "Where to eat in the mall"
    body:
      - >-
        VivoCity's food hall is the fastest place to find halal-friendly stalls,
        while the upper levels and the waterfront promenade lean towards full-service
        restaurants and cafés. The mix covers most cravings, so it's easy to eat
        local one visit and Western, Japanese or Korean the next.
    bullets:
      - "Food hall — quick local plates and halal-certified fast food"
      - "Upper levels — full-service restaurants and cafés"
      - "Waterfront promenade for a meal with a view"
  - h2: "HarbourFront & heading to Sentosa"
    body:
      - >-
        VivoCity sits directly above HarbourFront MRT and connects to HarbourFront
        Centre next door, so the whole area is one easy cluster. It's also the
        gateway to Sentosa via the boardwalk and the Sentosa Express, which makes it
        a natural place to eat before or after a day on the island.
    bullets:
      - "Directly above HarbourFront MRT"
      - "Linked to HarbourFront Centre next door"
      - "Gateway to Sentosa via the boardwalk and Express"
  - h2: "Getting there & finding halal near you"
    body:
      - >-
        HarbourFront MRT sits on both the North-East and Circle lines, so the mall
        is easy to reach from most of the island. To see exactly which outlets are
        certified and what's closest, open the directory and filter for halal.
    links:
      - label: "Browse the halal directory"
        href: "https://www.humblehalal.com/halal"
      - label: "Open the halal map"
