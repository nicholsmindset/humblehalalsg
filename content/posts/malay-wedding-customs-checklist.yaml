title: "Malay Wedding in Singapore: Customs, Checklist & Etiquette"
status: scheduled
dek: "From merisik and akad nikah to the bersanding dais and kompang procession — a plain-English guide to Malay wedding customs, planning and guest etiquette in Singapore."
answer: >-
  A Malay wedding in Singapore blends the religious akad nikah (solemnisation) with
  cultural customs like the bersanding dais, hantaran gift exchange and kompang
  procession. Planning usually spans venue, catering, attire, hantaran and the
  guest list, often over several months. This guide walks through the customs, a
  planning checklist and simple guest etiquette — confirm religious details with
  your kadi or a mosque.
