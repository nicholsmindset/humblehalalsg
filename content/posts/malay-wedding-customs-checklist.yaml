faq:
  - q: "What is the akad nikah?"
    a: >-
      The akad nikah is the Islamic solemnisation of marriage. The groom recites the
      marriage contract before a kadi (religious official) and witnesses, and the
      mahar (dowry) is given. It is the religious core of a Malay wedding; confirm the
      exact requirements with your kadi or a mosque.
  - q: "What is hantaran in a Malay wedding?"
    a: >-
      Hantaran is an exchange of gift trays between the two families, holding items
      such as clothing, prayer garments, sweets, fruit and toiletries, often arranged
      beautifully and counted in odd numbers. It is a gesture of goodwill and respect
      between the families.
  - q: "What do you wear to a Malay wedding in Singapore?"
    a: >-
      Dress modestly and smartly. Traditional attire such as baju kurung or baju melayu
      is welcome, and semi-formal clothing that covers appropriately is also fine.
      When in doubt, opt for something neat, colourful and respectful.
  - q: "How much money do you give at a Malay wedding?"
    a: >-
      There's no fixed amount — guests typically give a monetary gift in a decorated
      envelope (sampul duit), with the sum reflecting your relationship to the couple
      and your own means. Costs and expectations vary, so see our Malay wedding cost
      guide for context.
  - q: "What is bersanding?"
    a: >-
      Bersanding is the ceremony where the couple, in ceremonial attire, are seated
      together on a decorated dais (pelamin) to be seen and blessed by their guests.
      It is usually the centrepiece of the wedding feast (kenduri).
