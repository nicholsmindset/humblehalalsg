sections:
  - h2: "The stages of a Malay wedding"
    body:
      - >-
        A traditional Malay wedding is a sequence of events rather than a single day.
        It often begins with the merisik ("spying"), a discreet visit by the man's
        family to express interest, followed by the meminang or engagement, where
        both families agree on the details and a ring may be exchanged.
      - >-
        The heart of the wedding is the akad nikah — the Islamic solemnisation, in
        which the groom recites the marriage contract before a kadi (religious
        official) and witnesses, and the mahar (dowry) is given. The celebration
        that most guests attend is the kenduri or walimah, the wedding feast, which
        usually includes the bersanding — the couple seated in ceremonial dress on a
        decorated dais (pelamin) to be "seen" by their guests.
    bullets:
      - "Merisik — the family's first discreet enquiry"
      - "Meminang / bertunang — engagement and agreement on details"
      - "Akad nikah — the religious solemnisation before a kadi"
      - "Kenduri / walimah — the feast, usually with the bersanding"
  - h2: "Customs and their meaning"
    body:
      - >-
        Several customs give a Malay wedding its distinctive look and feel. The
        hantaran is an exchange of gift trays between the two families — items such as
        clothing, prayer garments, sweets, fruit and toiletries, often beautifully
        arranged and counted in odd numbers. The berinai (henna) sessions decorate the
        bride's hands ahead of the day.
      - >-
        On the day itself, the kompang — a hand-held frame drum — often accompanies
        the groom's arrival in a lively procession. During the bersanding, guests may
        take part in the merenjis, sprinkling scented water or rose petals and yellow
        rice as a blessing over the couple. Traditional attire such as the baju kurung,
        baju melayu and songket completes the picture.
    bullets:
      - "Hantaran — decorated gift trays exchanged between families"
      - "Berinai — henna applied to the bride's hands"
      - "Kompang — frame-drum procession welcoming the groom"
      - "Merenjis — sprinkling of scented water and yellow rice as a blessing"
  - h2: "A simple planning checklist"
    body:
      - >-
        Every family does things a little differently, and budgets and guest lists
        vary widely, so treat this as a starting framework rather than a fixed rulebook.
        Booking the venue, kadi and caterer early is the single most useful thing you
        can do, as popular weekends fill up months ahead.
    bullets:
      - "Set the budget and rough guest count first"
      - "Book the venue — void deck, community club, hotel or restaurant"
      - "Arrange the kadi and confirm akad nikah requirements"
      - "Book halal catering and confirm the menu and headcount"
      - "Plan attire, pelamin (dais), hantaran, photography and the kompang"
      - "Send invitations and track RSVPs"
  - h2: "Guest etiquette"
    body:
      - >-
        If you're invited to a Malay wedding, the customs are warm and welcoming and
        you don't need to worry about getting everything perfect. Dress modestly and
        smartly — many guests wear traditional or semi-formal attire. It's common to
        give a monetary gift, often in a decorated envelope (sampul duit), rather than
        a physical present.
      - >-
        Weddings are frequently held as an open house across set hours, so you can
        arrive within that window, greet and congratulate the couple and their
        families, enjoy the feast and stay as long as you like. Greet the couple with
        "selamat pengantin baru" (congratulations to the newlyweds).
    bullets:
      - "Dress modestly and smartly; traditional attire is welcome"
      - "A monetary gift in a sampul duit is customary"
      - "Come within the stated open-house hours; no need to stay all day"
  - h2: "Budgeting and vendors"
    body:
      - >-
        Costs depend enormously on the venue, guest numbers and how elaborate the
        pelamin, attire and hantaran are — a void-deck kenduri and a hotel ballroom
        sit at very different ends of the scale. For a fuller breakdown and to find
        Muslim-owned wedding vendors, caterers and planners, see our related guides and
        the directory.
