faq:
  - q: "What is the difference between a songkok and a kopiah?"
    a: >-
      The songkok is a tall, flat-topped velvet or felt cap worn for formal occasions
      and prayer, while the kopiah is usually a shorter, rounder skullcap, often
      crocheted or woven, worn for everyday prayers. Many men own both for different
      settings.
  - q: "Where can I buy a songkok in Singapore?"
    a: >-
      The Kampong Glam and Arab Street district near the Sultan Mosque, and the Geylang
      Serai area, are the traditional places to shop for songkok and kopiah. Stock is
      widest in the weeks before Ramadan and Hari Raya. Browse the directory for
      Muslim-owned clothing retailers.
  - q: "Why is the kopiah called a haji cap?"
    a: >-
      The white, often crocheted kopiah is commonly associated with men who have
      performed the Hajj pilgrimage, which is why it's nicknamed the "haji" cap. That
      said, anyone may wear one — it's a widely used everyday prayer cap.
  - q: "What size songkok should I buy?"
    a: >-
      Songkok are generally sized by head circumference, so the surest approach is to
      try one on: it should sit snug without pinching and not slide when you look down.
      If buying as a gift, measure the wearer's head circumference first.
  - q: "When is the best time to buy songkok in Singapore?"
    a: >-
      Any time of year works, but the widest selection appears in the run-up to Ramadan
      and Hari Raya, when shops around Kampong Glam and Geylang Serai stock up and the
      Hari Raya bazaars open. Popular sizes can sell out close to Eid, so shop early.
