title: "Songkok & Kopiah in Singapore: Where to Buy"
status: scheduled
dek: "The songkok and kopiah are staples of the Malay-Muslim wardrobe. Here's what they are, how they differ, how to pick the right fit, and the areas to shop for them in Singapore."
answer: >-
  The songkok is the tall, flat-topped velvet cap worn by Malay-Muslim men for
  prayer, weddings and formal occasions, while the kopiah (or "haji" cap) is
  usually a shorter, often crocheted or woven skullcap. In Singapore both are widely
  sold around Kampong Glam and Arab Street and in the Geylang Serai area, especially
  before Ramadan and Hari Raya. Try before you buy for the right fit.
