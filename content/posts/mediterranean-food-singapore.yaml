title: "Mediterranean Restaurants in Singapore (Halal-Friendly Guide)"
status: scheduled
dek: "Hummus, grilled meats, mezze and fresh pita — Mediterranean food is one of the most halal-friendly cuisines around. Here's where to eat it in Singapore."
answer: >-
  Mediterranean food is one of the most halal-friendly cuisines in Singapore: many
  dishes are naturally pork-free, and Muslim-owned and MUIS-certified spots cluster
  around Arab Street/Kampong Glam and the CBD. Look for the MUIS certificate or the
  Muslim-Owned label, and check that grilled meats are halal and no wine is used in
  cooking.
