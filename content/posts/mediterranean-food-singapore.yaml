sections:
  - h2: "Is Mediterranean food halal?"
    body:
      - >-
        Much of it is naturally halal-friendly. Mediterranean and Middle Eastern menus
        centre on grilled meats, rice, flatbreads, hummus, falafel and mezze — no pork
        in sight. The things to check are whether the meat is halal-slaughtered and
        whether any wine is used in sauces or cooking, both of which a certified or
        Muslim-run kitchen handles for you.
    bullets:
      - "Naturally pork-free — the base cuisine is halal-friendly"
      - "Confirm halal-slaughtered meat and no wine in cooking"
      - "Look for the MUIS certificate or the Muslim-Owned label"
  - h2: "Where to find it — Arab Street & Kampong Glam"
    body:
      - >-
        The heart of Mediterranean and Middle Eastern dining in Singapore is Kampong
        Glam and Arab Street, behind the Sultan Mosque. It's the easiest area to eat
        your way through mezze, shawarma, kebabs and Turkish and Lebanese mains, much of
        it Muslim-owned.
    bullets:
      - "Arab Street / Bussorah Street — the densest cluster"
      - "Turkish, Lebanese, Egyptian and North African spots"
      - "Great for groups and sharing plates"
  - h2: "What to order"
    body:
      - >-
        Mediterranean food is built for sharing, so order a spread and dig in.
    bullets:
      - "Hummus, baba ghanoush and mutabbal with warm pita"
      - "Falafel, kibbeh and stuffed vine leaves"
      - "Grilled meats — shish kebab, shish taouk, lamb"
      - "Mandi or briyani-style rice for the table"
  - h2: "Beyond Arab Street"
    body:
      - >-
        You'll also find halal Mediterranean in the CBD and scattered across the malls.
        For the wider cuisine and the shawarma scene specifically, see our related guides,
        or filter the directory for Mediterranean and Middle Eastern outlets near you.
    links:
      - label: "Browse the halal directory"
        href: "https://www.humblehalal.com/halal"
      - label: "Halal food in Bugis & Arab Street"
        href: "https://www.humblehalal.com/blog/halal-food-bugis-arab-street"
faq:
  - q: "Is Mediterranean food halal?"
    a: >-
      Mediterranean food is largely halal-friendly — it is naturally pork-free and built
      on grilled meats, rice, flatbread and mezze. Confirm the meat is halal-slaughtered
      and no wine is used in cooking, and look for a MUIS certificate or the Muslim-Owned
      label.
  - q: "Where is the best Mediterranean food in Singapore?"
    a: >-
      Kampong Glam and Arab Street, behind the Sultan Mosque, have the densest cluster of
      Muslim-owned Turkish, Lebanese and Middle Eastern spots. You'll also find halal
      Mediterranean in the CBD and several malls.
  - q: "Is shawarma halal in Singapore?"
    a: >-
      Shawarma from Muslim-owned and MUIS-certified outlets — common around Arab Street —
      is halal. As always, check the outlet's certification or Muslim-Owned label if you
      are unsure.
  - q: "What should I order at a Mediterranean restaurant?"
    a: >-
      Share a spread: hummus and baba ghanoush with pita, falafel and kibbeh, grilled
      shish kebab or shish taouk, and mandi or briyani-style rice. Finish with baklava
      and mint tea.
