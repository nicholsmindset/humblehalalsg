faq:
  - q: "Bila baca doa qunut?"
    a: >-
      Doa qunut is most commonly recited in the final rakaat of the Subuh prayer — after
      rising from ruku' and before sujud — and in the Witr prayer, especially in the latter
      half of Ramadan. Practices vary between schools of thought, so learn from a qualified
      teacher.
  - q: "What is doa qunut for?"
    a: >-
      It is a supplication in which the worshipper praises Allah and asks for guidance,
      wellbeing, protection from harm and forgiveness. Its heart is turning to Allah with
      hope and humility while standing in prayer.
  - q: "Is doa qunut compulsory in Subuh?"
    a: >-
      In the Shafi'i school followed by most Muslims in Singapore it is a well-known and
      encouraged sunnah in Subuh, not a pillar that invalidates the prayer if missed.
      Rulings differ between schools, so refer to MUIS and your asatizah.
  - q: "What do you say if the imam recites qunut?"
    a: >-
      In congregation, the imam recites the qunut aloud and the congregation says "Aamiin"
      to the supplication, softly affirming the closing praise. If you join partway, follow
      the imam.
  - q: "Where can I learn the full doa qunut and audio?"
    a: >-
      Refer to MUIS resources and your local asatizah for the complete Arabic text, correct
      pronunciation, audio and the differences of opinion. Learn the full wording from a
      qualified source rather than a partial version.
