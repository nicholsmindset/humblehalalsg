title: "Doa Qunut — Rumi, Meaning & When to Recite"
status: scheduled
dek: "What doa qunut is, when it is recited — commonly in Subuh and in Witr — and its purpose as a supplication, with a short well-known rumi line and meaning."
answer: >-
  Doa qunut is a supplication (doa) recited while standing in the final rakaat of certain
  prayers — commonly in the Subuh prayer, and in the Witr prayer. It is a moment to praise
  Allah and ask for guidance, protection and forgiveness. Below is a short, well-known rumi
  opening with its meaning, plus guidance on when it is recited. For the full Arabic, audio
  and any differences of opinion, refer to MUIS and your asatizah.
author: The Humble Halal Team
