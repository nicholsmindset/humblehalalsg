sections:
  - h2: "What is doa qunut?"
    body:
      - >-
        Doa qunut is a supplication recited while standing in prayer, most often in the
        final rakaat. Rather than a fixed obligation of every prayer, it is a special doa in
        which the worshipper praises Allah and asks for guidance, wellbeing, protection from
        harm and forgiveness. Because it is a doa, its heart is turning to Allah with hope
        and humility, not merely reciting set words.
      - >-
        In the Shafi'i school followed by most Muslims in Singapore, qunut in the Subuh
        prayer is a well-known and encouraged practice. Qunut is also recited in the Witr
        prayer, especially in the latter half of Ramadan. Practices vary between schools of
        thought, which is one reason to learn it from a qualified teacher.
    bullets:
      - "A supplication recited while standing, usually in the final rakaat"
      - "Praises Allah and asks for guidance, protection and forgiveness"
      - "Practice varies between schools of thought"
  - h2: "When is doa qunut recited?"
    body:
      - >-
        The two most common occasions are the Subuh prayer and the Witr prayer. In Subuh,
        qunut is recited in the second (final) rakaat, after rising from the ruku' (bowing)
        and before going down into sujud (prostration). In Witr, it is recited in the final
        rakaat in a similar position. There is also qunut nazilah — a supplication made at
        times of calamity or hardship affecting the ummah — which may be recited in other
        prayers.
    bullets:
      - "Subuh — in the final rakaat, after ruku', before sujud"
      - "Witr — in the final rakaat, notably in the latter half of Ramadan"
      - "Qunut nazilah — at times of hardship affecting the community"
    links:
      - label: "Today's prayer times & Subuh"
        href: "https://www.humblehalal.com/tools/prayer-times"
      - label: "Find the qibla direction"
        href: "https://www.humblehalal.com/tools/qibla"
  - h2: "A short well-known line, in rumi"
    body:
      - >-
        The doa qunut is a longer supplication, so rather than reproduce a full text here,
        it is best learned in full from a qualified source. A widely known opening line is:
      - >-
        Rumi: "Allahummah-dinii fiiman hadait" — Meaning: "O Allah, guide me among those
        You have guided." The supplication continues to ask for wellbeing, protection and
        blessing in what Allah has decreed, closing with praise upon the Prophet ﷺ. For the
        complete wording and correct pronunciation, follow the guidance below rather than
        memorising a partial version.
    bullets:
      - "Rumi opening: Allahummah-dinii fiiman hadait"
      - "Meaning: O Allah, guide me among those You have guided"
      - "Learn the full text from a qualified teacher, not a partial one"
  - h2: "How to raise the hands and follow the imam"
    body:
      - >-
        When reciting qunut, it is common to raise the hands in supplication. Praying in
        congregation, the imam recites the qunut aloud and the congregation says "Aamiin"
        to the supplication and softly affirms the closing praise. If you join a
        congregation partway, follow the imam. When praying alone, you recite it yourself.
        If you are still learning, it is perfectly fine to keep the prayer simple and add
        the qunut as you learn it correctly.
    links:
      - label: "Mosques & prayer spaces near you"
        href: "https://www.humblehalal.com/mosques"
      - label: "Doa selepas solat — dhikr after prayer"
        href: "https://www.humblehalal.com/blog/doa-selepas-solat"
  - h2: "Where to learn the full text and rulings"
    body:
      - >-
        Because doa qunut differs between schools of thought — when it is recited, and
        whether it is emphasised in Subuh — it is important to learn it from a reliable
        source rather than assume one practice is the only correct one. For the full Arabic
        text, correct pronunciation, audio, and to understand the differences of opinion,
        refer to MUIS resources and your local asatizah. This guide is an introduction, not
        a ruling.
