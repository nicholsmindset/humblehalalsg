faq:
  - q: "What is the doa for buka puasa?"
    a: >-
      A widely taught doa is "Allahumma inni laka sumtu wa bika aamantu wa 'ala rizqika
      aftartu" — "O Allah, for You I fasted, in You I believe, and with Your provision I
      break my fast." It is recited at Maghrib as you break the fast. Refer to MUIS and
      your asatizah for the full Arabic and audio.
  - q: "What is the niat puasa and when do you make it?"
    a: >-
      The niat is the intention to fast for Allah's sake. For the obligatory fasts of
      Ramadan it is made before dawn — commonly settled the night before, before the Subuh
      window begins. It can be held sincerely in the heart.
  - q: "Do you recite the doa before or after breaking fast?"
    a: >-
      The buka puasa doa is recited at the time of breaking fast, as Maghrib enters and you
      take your first date and water. Some recitations are affirmed just before and others
      just after the first sip; wording can differ slightly between teachers.
  - q: "What do you break your fast with?"
    a: >-
      It is sunnah to break the fast with dates and water once Maghrib enters, then pray
      Maghrib. Hastening to break fast at the correct time is encouraged, so keep a
      MUIS-aligned prayer timetable handy.
  - q: "Where can I learn the correct Arabic and pronunciation?"
    a: >-
      Refer to MUIS resources and your local asatizah for the complete Arabic text, correct
      pronunciation, audio and any differences of opinion. Learning from a qualified source
      is best.
