  - h2: "Where to learn the full Arabic and audio"
    body:
      - >-
        The recitations above are widely taught, but wording and additions can differ
        slightly between teachers, and there are recognised differences of opinion on some
        details of niat. For the complete Arabic text, correct pronunciation, audio and any
        rulings, refer to MUIS resources and your local asatizah. If you are near a mosque
        during Ramadan, many host communal iftar and terawih where you can learn directly.
    links:
