sections:
  - h2: "The niat (intention) to fast"
    body:
      - >-
        Every fast begins with niat — the intention to fast for the sake of Allah. For the
        obligatory fasts of Ramadan, the intention is made before dawn (before the Subuh
        window begins), and is commonly settled the night before. The niat is what turns
        abstaining from food and drink into an act of worship, so it comes first, before
        the pre-dawn meal (sahur) ends.
      - >-
        Rumi: "Nawaitu sauma ghadin 'an adaa-i fardhi syahri Ramadhaana haadzihis-sanati
        lillaahi ta'aalaa." Meaning: "I intend to fast tomorrow to fulfil the obligation of
        the month of Ramadan this year, for the sake of Allah the Most High." The intention
        can also be held sincerely in the heart; the spoken rumi above is a common way of
        learning and affirming it.
    bullets:
      - "Niat is the intention to fast for Allah's sake"
      - "For Ramadan, made before dawn — often the night before"
      - "It can be held in the heart; the spoken form aids learning"
  - h2: "The doa for buka puasa (breaking fast)"
    body:
      - >-
        At iftar — the moment of breaking fast at Maghrib — it is a beloved sunnah to make
        doa, as the supplication of a fasting person at the time of breaking fast is
        especially hoped to be accepted. Many Muslims break the fast with dates and water,
        then recite the well-known doa.
      - >-
        Rumi: "Allahumma inni laka sumtu wa bika aamantu wa 'ala rizqika aftartu." Meaning:
        "O Allah, for You I fasted, in You I believe, and with Your provision I break my
        fast." A short, widely taught addition is "Dzahabaz-zama-u wabtallatil-'uruuqu wa
        thabatal-ajru insya-Allah" — "The thirst is gone, the veins are moistened, and the
        reward is confirmed, if Allah wills."
    bullets:
      - "Recited at Maghrib, as you break the fast"
      - "Breaking fast with dates and water is sunnah"
      - "The fasting person's doa at iftar is especially hoped to be accepted"
  - h2: "When to recite each"
    body:
      - >-
        The two are easy to confuse, so it helps to fix the timing. The niat comes before
        the fast — the intention to fast the coming day, settled before dawn. The doa buka
        puasa comes at the end of the fast — as the sun sets and Maghrib enters, when you
        take your first sip or bite. Keep your prayer times handy so you break fast at the
        correct moment rather than guessing.
    links:
      - label: "Today's prayer times & Maghrib"
        href: "https://www.humblehalal.com/tools/prayer-times"
      - label: "Ramadan in Singapore 2026 guide"
        href: "https://www.humblehalal.com/blog/ramadan-singapore-2026-guide"
  - h2: "Manners and small sunnah at iftar"
    body:
      - >-
        Beyond the wording, the etiquette (adab) of buka puasa carries its own reward.
        Hasten to break the fast once Maghrib enters rather than delaying it, begin in the
        name of Allah, and take a moment for personal doa in your own words — for yourself,
        your family and the ummah — before the Maghrib prayer. After eating, many keep up
        their dhikr and remembrance through the evening.
    bullets:
      - "Hasten to break fast once Maghrib enters"
      - "Begin with dates and water, then pray Maghrib"
      - "Personal doa in your own words is encouraged at iftar"
    links:
      - label: "Digital tasbih counter for dhikr"
