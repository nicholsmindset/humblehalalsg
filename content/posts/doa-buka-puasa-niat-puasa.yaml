title: "Doa Buka Puasa & Niat Puasa: Rumi & Meaning"
status: scheduled
dek: "The widely taught doa for breaking fast (buka puasa) and the niat (intention) to fast — in rumi with English meaning, plus when to recite each."
answer: >-
  When breaking fast (buka puasa), many Muslims in Singapore recite the well-known doa
  "Allahumma inni laka sumtu wa bika aamantu wa 'ala rizqika aftartu" — "O Allah, for You
  I fasted, in You I believe, and with Your provision I break my fast." The niat (intention)
  to fast is made beforehand, usually the night before. Below are both in rumi with their
  meaning; refer to MUIS and your asatizah for the full Arabic and audio.
author: The Humble Halal Team
